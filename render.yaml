services:
  # The Consolidated Unified API (Combines Auth, Dispatch, etc.)
  - type: web
    name: teleems-api-gateway
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:api
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: teleems-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: teleems-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: teleems-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: teleems-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: teleems-db
          property: database
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: teleems-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: teleems-redis
          property: port
      - key: JWT_EXPIRATION
        value: 3h
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false

  # The Telelink Service (Kept as separate Microservice)
  - type: web
    name: telelink-service

    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:telelink
    startCommand: node dist/apps/telelink-service/main.js
    envVars:
      - key: NODE_ENV
        value: production

  - type: keyvalue
    name: teleems-redis
    plan: free
    ipAllowList: []

databases:
  - name: teleems-db
    databaseName: teleems
    user: teleems_user
    plan: free
