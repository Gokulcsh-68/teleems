services:
  - type: web
    name: teleems-auth-service
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:auth
    startCommand: node dist/apps/auth-service/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: teleems-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: teleems-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: teleems-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: teleems-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: teleems-db
          property: database
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRATION
        value: 15m
      - key: JWT_REFRESH_EXPIRATION
        value: 7d
      - key: REDIS_HOST
        fromService:
          type: redis
          name: teleems-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: teleems-redis
          property: port

  - type: redis
    name: teleems-redis
    plan: free
    ipAllowList: []

databases:
  - name: teleems-db
    databaseName: teleems
    user: teleems_user
    plan: free
