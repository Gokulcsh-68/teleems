services:
  # The Unified API Gateway (Accessible from the Public Internet)
  - type: web
    name: teleems-api-gateway
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:gateway
    startCommand: node dist/apps/api-gateway/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: AUTH_SERVICE_URL
        fromService:
          type: private_service
          name: teleems-auth-service
          property: host
      - key: DISPATCH_SERVICE_URL
        fromService:
          type: private_service
          name: teleems-dispatch-service
          property: host

  # The Auth Service (Private Backend Engine)
  - type: private_service
    name: teleems-auth-service
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:auth
    startCommand: node dist/apps/auth-service/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: teleems-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: teleems-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: teleems-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: teleems-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: teleems-db
          property: database
      - key: REDIS_HOST
        fromService:
          type: redis
          name: teleems-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: redis
          name: teleems-redis
          property: port

  # The Dispatch Service (Private Backend Engine)
  - type: private_service
    name: teleems-dispatch-service
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:dispatch
    startCommand: node dist/apps/dispatch-service/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: teleems-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: teleems-db
          property: port
      - key: DB_USER
        fromDatabase:
          name: teleems-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: teleems-db
          property: password
      - key: DB_NAME
        fromDatabase:
          name: teleems-db
          property: database

  - type: redis
    name: teleems-redis
    plan: free
    ipAllowList: []

databases:
  - name: teleems-db
    databaseName: teleems
    user: teleems_user
    plan: free
