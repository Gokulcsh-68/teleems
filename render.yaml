services:
  # The Consolidated Unified API (Combines Auth, Dispatch, etc.)
  - type: web
    name: teleems-api-gateway
    env: node
    plan: free
    buildCommand: npm install --include=dev && npm run build:api
    startCommand: node seed-admin.js && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: teleems-db-master
          property: host
      - key: DB_PORT
        fromDatabase:
          name: teleems-db-master
          property: port
      - key: DB_USER
        fromDatabase:
          name: teleems-db-master
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: teleems-db-master
          property: password
      - key: DB_NAME
        fromDatabase:
          name: teleems-db-master
          property: database
      - key: REDIS_HOST
        fromService:
          type: keyvalue
          name: teleems-redis
          property: host
      - key: REDIS_PORT
        fromService:
          type: keyvalue
          name: teleems-redis
          property: port
      - key: JWT_EXPIRATION
        value: 3h
      - key: JWT_PRIVATE_KEY
        sync: false
      - key: JWT_PUBLIC_KEY
        sync: false
      - key: ENFORCE_MFA
        value: "false"

  - type: keyvalue
    name: teleems-redis
    plan: free
    ipAllowList: []

databases:
  - name: teleems-db-master
    databaseName: teleems_v2
    user: teleems_admin
    plan: free
